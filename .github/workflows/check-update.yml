name: Check Windows Update & Generate Offsets

on:
  schedule:
    - cron: '0 6 * * *'  # UTC 06:00 daily (Taiwan 14:00)
  workflow_dispatch:

jobs:
  check-and-generate:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Get termsrv.dll version
        id: ver
        shell: pwsh
        run: |
          # Extract numeric-only version, strip any trailing "(WinBuild...)" suffix
          $raw = (Get-Item "$env:SystemRoot\System32\termsrv.dll").VersionInfo.FileVersion
          $v = ($raw -split ' ')[0].Trim()
          Write-Host "termsrv.dll version: $v"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Check if offsets already exist
        id: check
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          if (Test-Path "history/$v.ini") {
            Write-Host "Offsets for $v already exist, skipping."
            "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            Write-Host "New version detected: $v"
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Run RDPWrapOffsetFinder
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $lines = & ".\bin\RDPWrapOffsetFinder.exe" 2>&1
          Write-Host "--- RDPWrapOffsetFinder output ---"
          $lines | ForEach-Object { Write-Host $_ }

          # Parse all [section] blocks from tool output
          # Lines with [header] start a new section; key=value lines belong to current section
          New-Item -ItemType Directory -Force -Path "history" | Out-Null
          $existing = Get-Content "rdpwrap.ini" -Raw -ErrorAction SilentlyContinue
          $currentSection = $null
          $currentLines = @()
          $appended = 0

          foreach ($line in ($lines + @(""))) {
            if ($line -match '^\[(.+)\]$') {
              # Save previous section if it had content
              if ($currentSection -and $currentLines.Count -gt 0) {
                $block = "[$currentSection]`r`n" + ($currentLines -join "`r`n")
                $histFile = "history/$currentSection.ini"
                if (-not (Test-Path $histFile)) {
                  $block | Out-File -FilePath $histFile -Encoding utf8NoBOM
                }
                if ($existing -notmatch [regex]::Escape("[$currentSection]")) {
                  "`r`n$block" | Add-Content -Path "rdpwrap.ini" -Encoding utf8NoBOM
                  Write-Host "Appended section [$currentSection]"
                  $appended++
                }
              }
              $currentSection = $matches[1]
              $currentLines = @()
            } elseif ($line -match '^[^=]+=.+') {
              $currentLines += $line
            }
          }

          if ($appended -eq 0 -and -not (Test-Path "history/$v.ini")) {
            Write-Error "RDPWrapOffsetFinder produced no usable output for $v"
            exit 1
          }
          Write-Host "Done. $appended section(s) added."

      - name: Commit and push
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          git config user.name "rdpwrap-bot"
          git config user.email "rdpwrap-bot@users.noreply.github.com"
          git add rdpwrap.ini history/
          git commit -m "auto: offsets for Windows $v"
          git push
