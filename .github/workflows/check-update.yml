name: Check Windows Update & Generate Offsets

on:
  schedule:
    - cron: '0 6 * * *'  # UTC 06:00 daily (Taiwan 14:00)
  workflow_dispatch:

jobs:
  check-and-generate:
    runs-on: self-hosted
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run RDPWrapOffsetFinder and update offsets
        id: update
        shell: pwsh
        run: |
          $lines = & ".\bin\RDPWrapOffsetFinder.exe" 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "RDPWrapOffsetFinder failed with exit code $LASTEXITCODE"
            exit 1
          }
          Write-Host "--- RDPWrapOffsetFinder output ---"
          $lines | ForEach-Object { Write-Host $_ }

          New-Item -ItemType Directory -Force -Path "history" | Out-Null
          $existing = Get-Content "rdpwrap.ini" -Raw -ErrorAction SilentlyContinue
          $newSections = @()

          # Parse sections: collect lines per [header], save when next header or end reached
          $currentSection = $null
          $currentLines = @()

          $saveSection = {
            if ($currentSection -and $currentLines.Count -gt 0) {
              $block = "[$currentSection]`r`n" + ($currentLines -join "`r`n")
              $histFile = "history/$currentSection.ini"
              # Always write history snapshot (source of truth for what we've seen)
              if (-not (Test-Path $histFile)) {
                $block | Out-File -FilePath $histFile -Encoding utf8NoBOM
                Write-Host "Saved history: $histFile"
                $script:newSections += $currentSection
              } else {
                Write-Host "History already exists: $histFile"
              }
              # Append to rdpwrap.ini if missing
              if ($existing -notmatch [regex]::Escape("[$currentSection]")) {
                "`r`n$block" | Add-Content -Path "rdpwrap.ini" -Encoding utf8NoBOM
                Write-Host "Appended to rdpwrap.ini: [$currentSection]"
              } else {
                Write-Host "Already in rdpwrap.ini: [$currentSection]"
              }
            }
          }

          foreach ($line in $lines) {
            if ($line -match '^\[(.+)\]$') {
              & $saveSection
              $currentSection = $Matches[1]
              $currentLines = @()
            } elseif ($line.Trim() -ne '' -and $line -match '=') {
              $currentLines += $line
            }
          }
          & $saveSection  # save last section

          $count = $newSections.Count
          Write-Host "New sections added: $count"
          "new_count=$count" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          if ($count -gt 0) {
            "commit_msg=auto: offsets for $($newSections -join ', ')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Commit and push
        if: steps.update.outputs.new_count > 0
        shell: pwsh
        run: |
          git config user.name "rdpwrap-bot"
          git config user.email "rdpwrap-bot@users.noreply.github.com"
          git remote set-url origin "https://githubhjs:${{ secrets.PUSH_TOKEN }}@github.com/githubhjs/rdpwrap-jh-auto-offsets.git"
          git add rdpwrap.ini history/
          git commit -m "${{ steps.update.outputs.commit_msg }}"
          git push
